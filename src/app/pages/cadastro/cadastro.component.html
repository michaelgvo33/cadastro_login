<main class="flex min-h-screen items-center justify-center bg-slate-100 px-4 py-10">
 <section class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
 <div class="mb-6 text-center">
 <h1 class="text-2xl font-bold text-slate-800">Cadastro de Usuário</h1>
 <p class="mt-2 text-sm text-slate-500">
 Preencha os dados abaixo para criar um novo usuário.
 </p>
 </div>
 <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()" class="space-y-4">
 <div>
 <label for="nome" class="mb-1 block text-sm font-medium text-slate-700">
 Nome
 </label>
 <input
 id="nome"
 type="text"
 formControlName="nome"
 placeholder="Digite seu nome completo"
 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none
transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
 />
 </div>
 <div>
 <label for="email" class="mb-1 block text-sm font-medium text-slate-700">
 E-mail
 </label>
 <input
 id="email"
 type="email"
 formControlName="email"
 placeholder="Digite seu e-mail"
 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none
transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
 />
 </div>
 <div>
 <label for="senha" class="mb-1 block text-sm font-medium text-slate-700">
 Senha
 </label>
 <input
 id="senha"
 type="password"
 formControlName="senha"
 placeholder="Digite sua senha"
 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none
transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
 />
 </div>
 <div>
 <label for="repetirSenha" class="mb-1 block text-sm font-medium text-slate-700">
 Repetição da senha
 </label>
 <input
 id="repetirSenha"
 type="password"
 formControlName="repetirSenha"
 placeholder="Digite a senha novamente"
 class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none
transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
 />
 </div>
 @if (mensagemSucesso) {
 <p class="rounded-lg bg-green-50 px-3 py-2 text-sm text-green-700">
 {{ mensagemSucesso }}
 </p>
 }
 @if (mensagemErro) {
 <p class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">
 {{ mensagemErro }}
 </p>

 }
 <div class="flex gap-3 pt-2">
 <button
 type="submit"
 [disabled]="carregando"
 class="flex-1 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white
transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-70"
 >
 {{ carregando ? 'Cadastrando...' : 'Cadastrar' }}
 </button>
 <button
 type="button"
 (click)="limparFormulario()"
 class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700
transition hover:bg-slate-50"
 >
 Limpar
 </button>
 </div>
 </form>
 </section>
</main>
